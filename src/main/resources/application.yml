server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: espetinho-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/espetinho}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-not-configured}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-not-configured}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/api/v1/auth/google/callback/{registrationId}"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
    google-success-path: ${GOOGLE_SUCCESS_PATH:/auth/google/callback}
    google-failure-path: ${GOOGLE_FAILURE_PATH:/login}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-development-secret-key-with-at-least-32-characters}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  integrations:
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
    mercado-pago:
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
