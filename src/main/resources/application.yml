server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: espetinho-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/espetinho}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-development-secret-key-with-at-least-32-characters}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  integrations:
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
    mercado-pago:
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
